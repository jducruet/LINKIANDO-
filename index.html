<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeguroToy — Flujo completo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1726c4;--primary:#2f6bff;--orange:#f4490b;--orange2:#f97316;
    --bg:#f6f6fb;--surface:#fff;--border:#e3e7f2;--line:#eef0f7;--frame:#cdd6ec;
    --text:#1c2541;--muted:#7a849c;--faint:#9aa3ba;--success:#1fb16b;
    --blue-soft:#eef2ff;--green-soft:#e4f7ee;
    --font:"Nunito",system-ui,sans-serif;--r-card:12px;--r-seg:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#e9ecf6;color:var(--text);min-height:100vh;display:grid;place-items:center;padding:30px 16px 50px;-webkit-font-smoothing:antialiased}
  .device{width:393px;height:830px;background:#0c0c10;border-radius:52px;padding:13px;position:relative;box-shadow:0 0 0 2px #2a2a32,0 46px 90px -30px rgba(20,24,45,.55)}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:40px;overflow:hidden;display:flex;flex-direction:column}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:120px;height:33px;background:#000;border-radius:999px;z-index:30}
  .statusbar{flex:none;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-weight:800;font-size:15px}
  .appbar{flex:none;display:flex;align-items:center;gap:10px;padding:0 16px 8px}
  .appbar .b{width:30px;height:30px;border-radius:8px;background:#fff;border:1px solid var(--border);display:grid;place-items:center;color:var(--text);cursor:pointer}
  .appbar .back{display:none}.appbar.sub .back{display:grid}
  .brand{font-weight:900;font-size:17px}.brand .o{color:var(--orange2)}.appbar .sp{flex:1}

  .stage{flex:1;position:relative;overflow:hidden}
  .view{position:absolute;inset:0;overflow-y:auto;padding:0 16px 24px;transition:transform .3s cubic-bezier(.2,.7,.2,1),opacity .22s}
  .view::-webkit-scrollbar{width:0}
  .view.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
  .view.back{transform:translateX(-16%);opacity:0;pointer-events:none}

  /* ===== HERO ===== */
  .htitle{text-align:center;font-weight:900;font-size:28px;line-height:1.12;letter-spacing:-.02em;color:var(--navy);margin-top:2px}
  .htitle .o{color:var(--orange)}
  .hlead{text-align:center;font-weight:800;font-size:14px;color:var(--navy);margin-top:10px}
  .desde{text-align:center;font-weight:900;font-size:11px;letter-spacing:.14em;color:var(--orange);margin-top:14px}
  .bigprice{text-align:center;font-weight:900;font-size:42px;line-height:1;color:var(--orange);margin-top:2px}
  .pricenote{text-align:center;font-weight:700;font-size:12px;color:var(--muted);margin-top:5px}
  .heroimg{display:block;margin:12px auto 2px;width:210px;max-width:74%}
  .photos-t{text-align:center;font-weight:800;font-size:14px;color:var(--navy);margin-top:8px;line-height:1.3}
  .circles{display:flex;justify-content:center;gap:18px;margin-top:12px}
  .circ{display:flex;flex-direction:column;align-items:center;gap:7px;width:72px}
  .circ .ball{width:54px;height:54px;border-radius:50%;display:grid;place-items:center}
  .circ.c1 .ball{background:#e7eeff;color:var(--navy)}.circ.c2 .ball{background:#aab6f4;color:#fff}.circ.c3 .ball{background:var(--navy);color:#fff}
  .circ .ball svg{width:24px;height:24px}
  .circ .lab{font-size:11px;font-weight:800;color:var(--navy);text-align:center;line-height:1.15}
  .dsoft{height:1px;background:var(--border);margin:20px -16px 0}
  .cov{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:4px;margin:16px auto 0;max-width:330px;box-shadow:0 2px 8px rgba(28,37,65,.06)}
  .cov button{flex:1;border:0;background:transparent;cursor:pointer;font-family:inherit;font-weight:800;font-size:11.5px;color:var(--muted);padding:7px 0;border-radius:999px;display:flex;align-items:center;justify-content:center;gap:5px}
  .cov button[aria-selected="true"]{background:var(--navy);color:#fff}.cov svg{width:12px;height:12px}
  .sec2-title{text-align:center;font-weight:900;font-size:22px;line-height:1.15;color:var(--text);margin-top:18px}
  .sec2-sub{text-align:center;font-weight:800;font-size:13px;color:var(--orange);margin-top:7px}
  .pays{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
  .pays .lbl{font-size:11px;font-weight:800;color:var(--faint)}
  .pay-visa{position:relative;font-family:'Nunito',sans-serif;font-style:italic;font-weight:900;font-size:15px;letter-spacing:.3px;color:#1434CB;padding-bottom:3px}.pay-visa::after{content:'';position:absolute;left:1px;right:1px;bottom:0;height:2px;background:linear-gradient(90deg,#1434CB 55%,#F7B600 55%);border-radius:2px}
  .pay-mc{position:relative;width:26px;height:16px}.pay-mc i{position:absolute;top:0;width:16px;height:16px;border-radius:50%}.pay-mc .r{left:0;background:#eb001b}.pay-mc .y{right:0;background:#f79e1b;mix-blend-mode:multiply}
  .pay-yappy{display:flex;align-items:center;gap:4px;font-weight:900;font-size:13px;color:#16236b}.pay-yappy .ck{width:13px;height:13px;border-radius:50%;background:var(--success);display:grid;place-items:center;color:#fff}.pay-yappy .ck svg{width:8px;height:8px}
  .billing{display:flex;background:#eef0f7;border-radius:999px;padding:3px;margin:14px auto 20px;max-width:240px}
  .billing button{flex:1;border:0;background:transparent;cursor:pointer;font-family:inherit;font-weight:800;font-size:11px;color:var(--muted);padding:6px 0;border-radius:999px}
  .billing button[aria-selected="true"]{background:var(--navy);color:#fff}
  .sec-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 10px}

  .pcard{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:0 2px 8px rgba(28,37,65,.06);padding:14px 15px;margin-bottom:11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:11px}
  .pcard:hover{transform:translateY(-2px);border-color:#c9d4f5}
  .pcard.feat{border-color:var(--primary)}
  .pcard .badge{position:absolute;top:-9px;left:15px;font-size:10px;font-weight:900;color:#fff;padding:4px 10px;border-radius:999px}
  .badge.elegido{background:var(--orange2)}.badge.recom{background:var(--primary)}
  .pcard .info{flex:1;min-width:0}
  .pcard .pn{font-size:17px;font-weight:900;line-height:1.08}.pcard .pn .plus{color:var(--primary)}
  .pcard .pt{font-size:12px;font-weight:700;color:var(--muted);margin-top:1px}
  .pcard .pc{font-size:11px;font-weight:800;color:var(--faint);margin-top:0}
  .pcard .pr{flex:none;display:flex;flex-direction:column;align-items:center;text-align:center;line-height:1}
  .pcard .pr .fr{font-size:11.5px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  .pcard .pr .am{font-size:27px;font-weight:900;color:var(--orange);line-height:1}
  .pcard .pr .al{font-size:11px;font-weight:700;color:var(--muted);margin-top:3px}
  .pcard .cv{flex:none;color:var(--primary)}.pcard .cv svg{width:18px;height:18px;display:block}

  /* ===== DETALLE ===== */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:16px;margin-top:8px;overflow:hidden}
  .pname{font-size:21px;font-weight:900;letter-spacing:-.01em;line-height:1.06}
  .ptag{font-size:12.5px;font-weight:700;color:var(--muted);line-height:1.1}
  .price{display:flex;align-items:baseline;gap:7px;margin-top:13px}
  .price .from{font-size:12px;font-weight:800;color:var(--muted)}
  .price .big{font-size:33px;font-weight:900;letter-spacing:-.02em;color:var(--orange);line-height:1}
  .price .x3{font-size:13px;font-weight:800;color:var(--muted)}
  .price-sub{font-size:12px;font-weight:700;color:var(--muted);margin-top:4px}.price-sub .day{color:var(--success)}
  .seg{display:flex;background:var(--line);border-radius:8px;padding:3px;margin-top:12px;max-width:280px}
  .seg button{flex:1;border:0;background:transparent;cursor:pointer;font-family:inherit;font-weight:800;font-size:12px;color:var(--muted);padding:6px 0;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:5px}
  .seg button[aria-selected="true"]{background:var(--primary);color:#fff}.seg svg{width:12px;height:12px}
  .hr{height:1px;background:var(--line);margin:13px -16px}
  .steps{display:flex;align-items:flex-start;justify-content:space-between;position:relative;padding:2px 8px}
  .steps::before{content:"";position:absolute;top:16px;left:34px;right:34px;height:2px;background:var(--border)}
  .stp{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;width:70px;text-align:center}
  .stp .c{width:32px;height:32px;border-radius:50%;background:#fff;border:1.5px solid var(--border);display:grid;place-items:center;color:var(--faint)}.stp .c svg{width:15px;height:15px}
  .stp .n{position:absolute;top:-4px;right:14px;width:14px;height:14px;border-radius:50%;background:var(--faint);color:#fff;font-size:8px;font-weight:900;display:grid;place-items:center;border:2px solid var(--bg)}
  .stp .l{font-size:10.5px;font-weight:800;color:var(--muted)}
  .stp.on .c{background:var(--primary);border-color:var(--primary);color:#fff}.stp.on .n{background:var(--orange2)}.stp.on .l{color:var(--text)}
  .frow{display:flex;align-items:stretch;gap:10px;padding:13px 0;border-top:1px solid var(--line)}
  .lg{flex:none;width:46px;height:46px;position:relative;align-self:center}.lg svg{width:46px;height:46px;display:block}
  .lg .star{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--success);display:grid;place-items:center;border:2.5px solid #fff}.lg .star svg{width:11px;height:11px}
  .gr{flex:1;min-width:0;position:relative;border:1.5px solid var(--frame);border-radius:11px;padding:11px 12px;display:flex;flex-direction:column;gap:8px;justify-content:center}
  .gr .ribbon{position:absolute;top:-9px;left:11px;font-size:9.5px;font-weight:900;color:var(--success);background:var(--green-soft);padding:2px 8px;border-radius:999px;border:2px solid #fff}
  .ben{display:flex;align-items:center;gap:8px}
  .ben .bi{flex:none;width:26px;height:26px;display:grid;place-items:center;color:var(--navy)}.ben .bi svg{width:24px;height:24px}.ben .bi.vial{color:var(--orange2)}
  .ben .bt{font-weight:900;font-size:13px;line-height:1.12}
  .ben .bs{font-size:11px;font-weight:800;color:var(--muted);margin-top:2px;display:flex;gap:8px}.ben .bs .st{display:flex;align-items:center;gap:3px}.ben .bs svg{width:12px;height:12px}
  .rcol{flex:none;width:98px;margin-right:-8px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end}
  .amt{text-align:right;padding-right:8px}.amt .v{font-size:18px;font-weight:900;line-height:1}.amt .u{font-size:11px;color:var(--muted);font-weight:800}.amt .alt{display:block;font-size:10px;font-weight:700;color:var(--faint);margin-top:2px}
  .buy{border:0;cursor:pointer;font-family:inherit;font-weight:900;font-size:12px;color:#fff;background:var(--primary);padding:9px 0;width:100%;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:5px}.buy:hover{background:var(--navy)}.buy svg{width:13px;height:13px}
  .more{margin-top:16px;width:100%;border:1.5px solid var(--primary);background:#fff;color:var(--primary);cursor:pointer;font-family:inherit;font-weight:900;font-size:14px;padding:13px 18px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:9px;line-height:1.25;text-align:center}.more:hover{background:var(--blue-soft)}.more svg{width:18px;height:18px;flex:none}
  .note{display:flex;align-items:center;gap:7px;margin-top:12px;padding:9px 11px;background:var(--bg);border-radius:8px}.note svg{flex:none;width:16px;height:16px;color:var(--success)}.note p{font-size:11.5px;font-weight:700;color:var(--muted)}

  /* ===== MATRIZ ===== */
  .cmpttl{font-size:13px;font-weight:900;color:var(--navy);text-align:center;margin:2px 0 10px}
  .tableWrap{overflow-x:auto;border:1px solid var(--frame);border-radius:11px}
  .grid{min-width:330px;display:grid;grid-template-columns:54px repeat(var(--cols,4),1fr)}
  .cl{padding:8px 4px;border-bottom:1px solid var(--line);text-align:center;font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;min-height:44px;position:relative}
  .cl.lbl{text-align:left;align-items:flex-start;color:var(--muted);font-size:9.5px;text-transform:uppercase;gap:3px;padding-left:7px}.cl.lbl svg{width:14px;height:14px;color:var(--navy)}
  .col-l{border-right:1px solid var(--line);position:sticky;left:0;background:var(--surface);z-index:2}
  .hc{padding:8px 3px;border-bottom:1px solid var(--frame);display:flex;flex-direction:column;align-items:center;gap:3px}.hc .lg2{width:28px;height:28px}.hc .lg2 svg{width:28px;height:28px;display:block}.hc .nm{font-size:9.5px;font-weight:900;line-height:1}
  .hcorner{border-bottom:1px solid var(--frame);border-right:1px solid var(--line);position:sticky;left:0;background:var(--surface);z-index:3}
  .mv{font-size:12px;font-weight:900;color:var(--text);line-height:1.05}.mv.price{color:var(--orange);font-size:13px}.msub{font-size:9px;font-weight:700;color:var(--muted)}
  .ic{width:16px;height:16px}.ic.yes{color:var(--success)}.ic.no{color:var(--faint)}
  .best{background:var(--green-soft);border-radius:8px}.best .mv{color:#0f7a4f}
  .crown{position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:15px;height:15px;border-radius:50%;background:var(--success);display:grid;place-items:center;border:2px solid #fff}.crown svg{width:8px;height:8px}
  .mbuy{border:0;cursor:pointer;font-family:inherit;font-weight:900;font-size:10.5px;color:#fff;background:var(--primary);padding:7px 0;width:100%;border-radius:7px}
  .summ{display:flex;gap:8px;margin-top:12px}.scard{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px;text-align:center}.scard .t{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase}.scard .b{font-size:14px;font-weight:900;margin-top:2px}.scard .b.win{color:var(--success)}.scard .b.cheap{color:var(--orange)}

  .home-ind{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:999px;background:#1c2541;opacity:.35;z-index:20}
  .hint{margin-top:14px;text-align:center;color:#6b7390;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div>
  <div class="device"><div class="screen">
    <div class="island"></div>
    <div class="statusbar"><span>9:41</span><span aria-hidden="true"><svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#1c2541" stroke-opacity=".5"/><rect x="3" y="3" width="16" height="7" rx="1.5" fill="#1c2541"/></svg></span></div>
    <div class="appbar" id="appbar">
      <span class="b back" id="backBtn" aria-label="Volver"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></span>
      <span class="brand">seguro<span class="o">toy</span></span><span class="sp"></span>
      <span class="b"><svg width="16" height="12" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1h16M1 7h16M1 13h16"/></svg></span>
    </div>
    <div class="stage">
      <div class="view" id="home"></div>
      <div class="view hidden" id="detail"></div>
      <div class="view hidden" id="matrix"></div>
    </div>
    <div class="home-ind"></div>
  </div></div>
  <div class="hint">Toca un plan → detalle → «Compara todos los beneficios» → matriz</div>
</div>

<script>
const I={
  repeat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg>',
  dollar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 6.5C17 4.6 14.8 3.5 12 3.5S7 4.6 7 6.5 9 9.5 12 10s5 1.6 5 3.5-2.2 3-5 3-5-1.1-5-3"/></svg>',
  tow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16v-4h7l3.2-3.2a2 2 0 0 1 1.4-.6H17a2 2 0 0 1 2 2V16"/><path d="M2 16h2M19 16h2"/><circle cx="6.5" cy="18" r="2"/><circle cx="17.5" cy="18" r="2"/><path d="M14 8.2l5 3.8"/></svg>',
  amb:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17V9h11l3 3h4v5"/><circle cx="7" cy="18" r="1.8"/><circle cx="17" cy="18" r="1.8"/><path d="M7 6v4M5 8h4"/></svg>',
  scale:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M7 21h10M5 7l-3 6h6zM19 7l-3 6h6zM5 7h14"/></svg>',
  cone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M10 4h4l4 15H6z"/><path d="M4 19h16M8.5 11h7M7.5 15h9"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>',
  cart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/><path d="M3 4h2l2.4 12.2A1.5 1.5 0 0 0 8.9 17.4H18a1.5 1.5 0 0 0 1.5-1.2L21 8H6"/></svg>',
  table:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16M15 4v16"/></svg>',
  pick:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  pay:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>',
  camera:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.2"/></svg>',

/* ===== DETALLE ===== */
function steps(){return `<div class="steps">${STEPS.map((s,i)=>`<div class="stp ${i===0?'on':''}"><span class="n">${s.n}</span><span class="c">${s.ic}</span><span class="l">${s.l}</span></div>`).join('')}</div>`;}
function dPrice(p){return mode==='3pagos'?`<span class="from">Desde</span><span class="big">$${p.fromM}</span><span class="x3">×3 meses</span>`:`<span class="from">Desde</span><span class="big">$${p.fromA}</span><span class="x3">/año</span>`;}
function dSub(p){return mode==='3pagos'?`equivale a $${p.fromA}/año · <span class="day">$${p.day} al día</span>`:`o $${p.fromM} ×3 · <span class="day">$${p.day} al día</span>`;}
function dRowPrice(x){return mode==='3pagos'?`<span class="v">$${x.m}</span><span class="u"> ×3</span><span class="alt">o $${x.a}/año</span>`:`<span class="v">$${x.a}</span><span class="u">/año</span><span class="alt">o $${x.m} ×3</span>`;}
function detRow(x){const pr=PROF[x.k];return `<div class="frow">
  <span class="lg">${MARKS[x.k]}${x.best?`<span class="star">${TROPHY}</span>`:''}</span>
  <div class="gr">${x.best?'<span class="ribbon">Mejor grúa</span>':''}
    <div class="ben"><span class="bi">${I.tow}</span><div><div class="bt">${pr.grua}</div><div class="bs"><span class="st">${I.repeat}${pr.ev}/año</span><span class="st">${I.shield}B/.${pr.lim}</span></div></div></div>
    <div class="ben"><span class="bi vial">${I.cone}</span><div><div class="bt">Asistencia vial</div><div class="bs"><span class="st">${pr.vial} de 7 servicios</span></div></div></div>
  </div>
  <div class="rcol"><div class="amt">${dRowPrice(x)}</div><button class="buy">${I.cart}Comprar</button></div></div>`;}
function renderDetail(){const p=PLANS[curPlan];const ribbon=p.badge?`<span class="badge ${p.badge}" style="position:static;display:inline-block;margin-bottom:6px">${BADGE[p.badge]}</span>`:'';
  document.getElementById('detail').innerHTML=`<div class="card">
    ${ribbon?ribbon+'<br>':''}<div class="pname">${p.plus?'Plan ':'Plan '}${p.name}</div><div class="ptag">${p.tag}</div>
    <div class="price">${dPrice(p)}</div><div class="price-sub">${dSub(p)}</div>
    <div class="seg"><button data-m="3pagos" aria-selected="${mode==='3pagos'}">${I.repeat}3 pagos</button><button data-m="anual" aria-selected="${mode==='anual'}">${I.calendar}Anual</button></div>
    <div class="hr"></div>${steps()}<div class="hr"></div>
    ${p.ins.map(detRow).join('')}
    <button class="more" onclick="openMatrix()">${I.table}<span>Compara aquí, todos los beneficios de estos planes</span></button>
    <div class="note">${I.check}<p>Todas cumplen el mínimo de ley. Cambia la asistencia, no el límite.</p></div>
  </div>`;
  document.querySelector('#detail .seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;renderDetail();});
}

/* ===== MATRIZ ===== */
const YES=`<svg class="ic yes" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>`;
const NO=`<svg class="ic no" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`;
function idxMin(arr){let bi=0;arr.forEach((v,i)=>{if(v<arr[bi])bi=i;});return bi;}
function idxMax(arr){let bi=0;arr.forEach((v,i)=>{if(v>arr[bi])bi=i;});return bi;}
function renderMatrix(){const p=PLANS[curPlan];const cols=p.ins.map(x=>x.k);const profs=cols.map(k=>PROF[k]);
  const priceVals=p.ins.map(x=>parseFloat(x.m));
  const bestPrice=idxMin(priceVals);
  const bestGrua=idxMax(profs.map(pr=>pr.ev*1000+pr.lim));
  const bestLegal=idxMax(profs.map(pr=>pr.lp+pr.lc));
  const bestVial=idxMax(profs.map(pr=>pr.vial));
  const cheapName=PROF[cols[bestPrice]].short, winName=PROF[cols[bestVial]].short;
  const hdr=`<div class="hcorner"></div>`+cols.map(k=>`<div class="hc"><span class="lg2">${MARKS[k]}</span><span class="nm">${PROF[k].short}</span></div>`).join('');
  function rowHTML(icon,label,cells,best){let h=`<div class="cl lbl col-l">${icon}${label}</div>`;cells.forEach((c,ci)=>{const b=ci===best;h+=`<div class="cl ${b?'best':''}">${b?`<span class="crown">${I.crown}</span>`:''}${c}</div>`;});return h;}
  let g=hdr;
  g+=rowHTML(I.dollar,'Precio',p.ins.map(x=>mode==='3pagos'?`<span class="mv price">$${x.m}</span><span class="msub">×3</span>`:`<span class="mv price">$${x.a}</span><span class="msub">/año</span>`),bestPrice);
  g+=rowHTML(I.tow,'Grúa',profs.map(pr=>`<span class="mv">${pr.ev}/año</span><span class="msub">B/.${pr.lim}</span>`),bestGrua);
  g+=rowHTML(I.amb,'Ambul.',profs.map(pr=>pr.amb?YES:NO),profs.findIndex(pr=>pr.amb));
  g+=rowHTML(I.scale,'Legal',profs.map(pr=>`<span class="mv">B/.${Math.max(pr.lp,pr.lc)}</span><span class="msub">${pr.lc?'penal+civil':'solo penal'}</span>`),bestLegal);
  g+=rowHTML(I.cone,'Vial',profs.map(pr=>`<span class="mv">${pr.vial}/7</span><span class="msub">servicios</span>`),bestVial);
  g+=`<div class="cl lbl col-l"></div>`+cols.map(()=>`<div class="cl"><button class="mbuy">Lo quiero</button></div>`).join('');
  document.getElementById('matrix').innerHTML=`<div class="card">
    <div class="pname">Plan ${p.name}</div><div class="ptag">${p.tag}</div>
    <div class="price">${dPrice(p)}</div><div class="price-sub">${dSub(p)}</div>
    <div class="seg"><button data-m="3pagos" aria-selected="${mode==='3pagos'}">${I.repeat}3 pagos</button><button data-m="anual" aria-selected="${mode==='anual'}">${I.calendar}Anual</button></div>
    <div class="hr"></div>${steps()}<div class="hr"></div>
    <div class="cmpttl">Compara todo de un vistazo</div>
    <div class="tableWrap"><div class="grid" style="--cols:${cols.length}">${g}</div></div>
    <div class="summ"><div class="scard"><div class="t">Más completa</div><div class="b win">${winName}</div></div><div class="scard"><div class="t">Más barata</div><div class="b cheap">${cheapName}</div></div></div>
  </div>`;
  document.querySelector('#matrix .seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;renderMatrix();});
}

/* ===== NAV ===== */
const home=document.getElementById('home'),detail=document.getElementById('detail'),matrix=document.getElementById('matrix'),appbar=document.getElementById('appbar');
let stack=['home'];
function show(view){home.className='view'+(view==='home'?'':' back');detail.className='view'+(view==='detail'?'':(view==='matrix'?' back':' hidden'));matrix.className='view'+(view==='matrix'?'':' hidden');appbar.classList.toggle('sub',view!=='home');[home,detail,matrix].forEach(v=>v.scrollTop=0);}
function openDetail(id){curPlan=id;renderDetail();stack=['home','detail'];show('detail');}
function openMatrix(){renderMatrix();stack=['home','detail','matrix'];show('matrix');}
document.getElementById('backBtn').addEventListener('click',()=>{stack.pop();const v=stack[stack.length-1]||'home';show(v);});
renderHome();
</script>
</body>
</html>
